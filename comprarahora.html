<body>

<!-- HEADER -->
<header class="header">
  <div class="container header-inner">
    
    <a href="index.html" class="brand">

<!-- SECCIÓN COMPRA -->
<section class="checkout-section">
    <div class="container checkout-grid">

        <!-- PRODUCTO -->
        <div class="product-box">
            <img src="/images/macush_product.png" alt="Macush">

            <div class="product-info">
                <h1>MACUSH</h1>
                <p>Maca Gelatinizada + Cushuro Liofilizado</p>
                <span class="price">S/ 50.00</span>

                <div class="quantity">
                    <label>Cantidad</label>
                    <input type="number" value="1" min="1">
                </div>

                <button class="btn-primary large">🛒 Comprar ahora</button>

                <p class="secure">🔒 Pago 100% seguro</p>
            </div>
        </div>

        <!-- RESUMEN -->
        <div class="summary-box">
            <h2>Resumen del pedido</h2>

            <div class="summary-line">
                <span>Producto</span>
                <span>S/ 50.00</span>
            </div>

            <div class="summary-line">
                <span>Envío</span>
                <span>Gratis</span>
            </div>

            <div class="summary-total">
                <span>Total</span>
                <span>S/ 50.00</span>
            </div>

            <button class="btn-primary full">Finalizar compra</button>

            <div class="payments">
                <p>Métodos de pago</p>
                <div class="payment-icons">
                    💳 Visa  
                    💳 Mastercard  
                    🅿️ PayPal  
                    📱 Yape
                </div>
            </div>
        </div>

    </div>
</section>
